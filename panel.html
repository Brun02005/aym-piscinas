<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel A&M Piscinas — Gestión</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="logo.svg">
<link rel="stylesheet" href="panel.css">
</head>
<body>

<!-- ============ LOGIN ============ -->
<div class="login-screen" id="login-screen" hidden>
  <form class="login-card" id="login-form">
    <img class="login-logo" src="logo.png" alt="A&amp;M Piscinas" onerror="this.onerror=null;this.src='logo.svg'">
    <h1>Panel A&amp;M</h1>
    <p>Gestión de pedidos, escuadras y stock.<br>Solo personal autorizado.</p>
    <label for="login-email">Email</label>
    <input type="email" id="login-email" autocomplete="username" required>
    <label for="login-pass">Contraseña</label>
    <input type="password" id="login-pass" autocomplete="current-password" required>
    <button type="submit" id="login-btn">Ingresar</button>
    <div class="login-error" id="login-error"></div>
    <a class="login-back" href="index.html">← Volver al sitio</a>
  </form>
</div>

<!-- ============ APP ============ -->
<div class="app" id="app" hidden>
  <header class="app-top">
    <div class="app-brand">
      <img src="logo.png" alt="" onerror="this.onerror=null;this.src='logo.svg'">
      <div>
        <b>Panel A&amp;M</b>
        <span id="app-user"></span>
      </div>
    </div>
    <nav class="app-tabs" id="app-tabs">
      <button class="app-tab active" data-tab="resumen">Resumen</button>
      <button class="app-tab" data-tab="pedidos">Pedidos <span class="badge" id="badge-nuevos" hidden></span></button>
      <button class="app-tab" data-tab="escuadras">Escuadras</button>
      <button class="app-tab" data-tab="stock">Stock</button>
    </nav>
    <div class="app-actions">
      <a class="app-link" href="index.html" target="_blank" rel="noopener">Ver sitio</a>
      <button class="app-logout" id="btn-logout">Salir</button>
    </div>
  </header>

  <main class="app-main" id="app-main"><!-- generado por JS --></main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-config.js"></script>
<script src="panel.js"></script>
</body>
</html>
